<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界书检索器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

/* 上传遮罩 */
#upload-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#upload-overlay.hidden { display: none; }
#drop-zone { width: 500px; max-width: 90vw; padding: 60px 40px; border: 2px dashed #0f3460; border-radius: 16px; text-align: center; cursor: pointer; transition: all .2s; }
#drop-zone:hover, #drop-zone.dragover { border-color: #e94560; background: rgba(233,69,96,.05); }
#drop-zone .icon { font-size: 48px; margin-bottom: 16px; }
#drop-zone h2 { font-size: 20px; color: #e0e0e0; margin-bottom: 8px; }
#drop-zone p { font-size: 13px; color: #888; }
#drop-zone .file-btn { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #e94560; color: #fff; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; }
#drop-zone .file-btn:hover { background: #d63850; }
#drop-zone .status-text { margin-top: 16px; font-size: 13px; color: #7ec8e3; }

/* 加载指示器 */
#loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; z-index: 998; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#loading-overlay.hidden { display: none; }
#loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid #0f3460; border-top-color: #e94560; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
#loading-overlay p { font-size: 14px; color: #888; }

/* 侧边栏 */
#sidebar { width: 300px; min-width: 300px; background: #16213e; display: flex; flex-direction: column; border-right: 1px solid #0f3460; }
#sidebar-header { padding: 16px; border-bottom: 1px solid #0f3460; }
#sidebar-header h1 { font-size: 18px; color: #e94560; margin-bottom: 4px; }
#sidebar-header .stats { font-size: 12px; color: #888; }
#sidebar-header .stats a { color: #7ec8e3; cursor: pointer; text-decoration: underline; margin-left: 8px; }
#sidebar-header .source-badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 8px; margin-left: 6px; }
#sidebar-header .source-badge.live { background: #1a3a1a; color: #4caf50; }
#sidebar-header .source-badge.cached { background: #3a2a1a; color: #ff9800; }

#search-box { padding: 12px 16px; }
#search-box input { width: 100%; padding: 10px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; transition: border-color .2s; }
#search-box input:focus { border-color: #e94560; }
#search-box .hint { font-size: 11px; color: #666; margin-top: 6px; }

#cat-filters { flex: 1; overflow-y: auto; padding: 8px 16px; }
#cat-filters h3 { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
.cat-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; margin: 2px; border-radius: 14px; font-size: 12px; cursor: pointer; border: 1px solid #0f3460; background: transparent; color: #aaa; transition: all .15s; user-select: none; }
.cat-chip:hover { border-color: #e94560; color: #fff; }
.cat-chip.active { background: #e94560; border-color: #e94560; color: #fff; }
.cat-chip .count { font-size: 10px; opacity: .7; }

/* 主区域 */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { padding: 12px 20px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
#topbar .result-info { font-size: 13px; color: #aaa; }
#topbar .result-info span { color: #e94560; font-weight: bold; }
#topbar .quick-actions { display: flex; gap: 8px; }
#topbar button { padding: 6px 14px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #aaa; cursor: pointer; font-size: 12px; transition: all .15s; }
#topbar button:hover { border-color: #7ec8e3; color: #fff; }
#topbar button.clear-btn:hover { border-color: #e94560; }

#results { flex: 1; overflow-y: auto; padding: 12px 20px; }
#results .empty { text-align: center; color: #666; padding: 60px 0; font-size: 14px; }

/* 结果卡片 */
.card { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; transition: border-color .15s; cursor: pointer; }
.card:hover { border-color: #7ec8e3; }
.card.expanded { border-color: #e94560; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.card-title { font-size: 15px; font-weight: 600; color: #e0e0e0; flex: 1; word-break: break-all; }
.card-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.card-cat { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #0f3460; color: #7ec8e3; white-space: nowrap; }
.card-uid { font-size: 11px; color: #666; white-space: nowrap; }
.card-keys { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.card-key { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #1a1a2e; color: #888; border: 1px solid #0f3460; }
.card-preview { font-size: 12px; color: #999; margin-top: 8px; line-height: 1.6; white-space: pre-line; max-height: 60px; overflow: hidden; position: relative; }
.card-preview::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 24px; background: linear-gradient(transparent, #16213e); }
.card.expanded .card-preview { max-height: none; }
.card.expanded .card-preview::after { display: none; }
.card-full { display: none; font-size: 13px; color: #ccc; margin-top: 10px; line-height: 1.8; white-space: pre-line; border-top: 1px solid #0f3460; padding-top: 10px; }
.card.expanded .card-full { display: block; }
.card-actions { display: none; gap: 8px; margin-top: 10px; }
.card.expanded .card-actions { display: flex; }
.card-actions button { padding: 4px 12px; font-size: 11px; border: 1px solid #0f3460; border-radius: 4px; background: transparent; color: #aaa; cursor: pointer; }
.card-actions button:hover { border-color: #7ec8e3; color: #fff; }

.highlight { background: #e94560; color: #fff; padding: 0 2px; border-radius: 2px; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #1a5080; }

@media (max-width: 768px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; min-width: 100%; max-height: 35vh; }
  #sidebar-header { padding: 10px 14px; }
  #sidebar-header h1 { font-size: 16px; }
  #search-box { padding: 8px 14px; }
  #search-box input { padding: 12px 14px; font-size: 16px; }  /* 手机输入更大 */
  #cat-filters { padding: 6px 10px; }
  .cat-chip { padding: 6px 12px; font-size: 13px; margin: 3px; }
  #main { height: 65vh; }
  #topbar { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
  #topbar .result-info { font-size: 12px; }
  #topbar button { padding: 8px 14px; font-size: 13px; }
  #results { padding: 8px 10px; }
  .card { padding: 12px 14px; margin-bottom: 8px; }
  .card-title { font-size: 14px; }
  .card-key { font-size: 12px; padding: 4px 10px; }
  /* 手机端：复制按钮始终可见，不用展开卡片 */
  .card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .card-actions button { padding: 8px 14px; font-size: 13px; }
  .card-preview { max-height: 40px; }
  .card-full { font-size: 12px; }
}
</style>
</head>
<body>

<!-- 加载指示器 -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text">正在加载世界书数据...</p>
</div>

<!-- 上传界面（兜底） -->
<div id="upload-overlay" class="hidden">
  <div id="drop-zone">
    <div class="icon">📂</div>
    <h2>拖拽世界书 JSON 到这里</h2>
    <p>或者点击下方按钮选择文件</p>
    <label class="file-btn">选择文件<input type="file" id="file-input" accept=".json" style="display:none"></label>
    <div class="status-text" id="upload-hint"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>🔍 世界书检索器</h1>
    <div class="stats">
      <span id="total-count">0</span> 条
      <span class="source-badge" id="source-badge" style="display:none"></span>
      <a onclick="reloadData()" title="重新加载 JSON">刷新</a>
      <a onclick="showUpload()" title="手动选择文件">换文件</a>
    </div>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="搜索标题 / 内容 / 关键词..." autofocus disabled>
    <div class="hint">支持空格分词 · 实时筛选 · 点击卡片展开详情</div>
  </div>
  <div id="cat-filters">
    <h3>分类筛选</h3>
    <div id="cat-chips"></div>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div class="result-info">显示 <span id="match-count">0</span> 条</div>
    <div class="quick-actions">
      <button onclick="clearAll()" class="clear-btn">清除筛选</button>
      <button onclick="exportVisible()">导出可见列表</button>
    </div>
  </div>
  <div id="results">
    <div class="empty">正在加载数据...</div>
  </div>
</div>

<script>
// ====== 常量 ======
var WORLD_BOOK_FILENAME = "性癖大百科_BL正太版.json";
var IDB_DB_NAME = "worldbook-searcher";
var IDB_STORE_NAME = "entries";
var IDB_VERSION = 1;

var ENTRIES = [];
var CAT_DEFS = {
  "A":"世界观-世界","B":"世界观-设定","C":"世界观-地点",
  "D":"角色-特质","E":"角色-身份","F":"角色-职业",
  "G":"角色-幻想","H":"角色-关系","I":"角色-能力",
  "J":"恋物-服饰","K":"恋物-身体","L":"恋物-感官","M":"恋物-物品",
  "N":"剧情-性爱","O":"剧情-NTR","P":"剧情-行为","Q":"剧情-事件",
  "R":"剧情-变化","S":"剧情-幻想",
  "T":"SM-痛苦","U":"SM-耻辱","V":"SM-物化"
};
var CAT_ORDER = "ABCDEFGHIJKLMNOPQRSTUV";
var activeCat = "__ALL__";
var searchTerm = "";

// ====== IndexedDB 缓存 ======

function openIDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(IDB_DB_NAME, IDB_VERSION);
    req.onupgradeneeded = function(e) {
      e.target.result.createObjectStore(IDB_STORE_NAME, { keyPath: "uid" });
    };
    req.onsuccess = function(e) { resolve(e.target.result); };
    req.onerror = function(e) { reject(e.target.error); };
  });
}

function loadFromIDB() {
  return openIDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE_NAME, "readonly");
      var store = tx.objectStore(IDB_STORE_NAME);
      var req = store.getAll();
      req.onsuccess = function() { resolve(req.result.length > 0 ? req.result : null); };
      req.onerror = function() { reject(req.error); };
      tx.oncomplete = function() { db.close(); };
    });
  });
}

function saveToIDB(entries) {
  return openIDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction(IDB_STORE_NAME, "readwrite");
      var store = tx.objectStore(IDB_STORE_NAME);
      store.clear();
      entries.forEach(function(e) { store.put(e); });
      tx.oncomplete = function() { db.close(); resolve(); };
      tx.onerror = function() { reject(tx.error); };
    });
  });
}

// ====== JSON 解析 ======

function parseWorldbook(data) {
  var entries = [];
  var rawEntries;

  if (data.entries) {
    if (Array.isArray(data.entries)) {
      rawEntries = data.entries;
    } else {
      rawEntries = Object.values(data.entries);
    }
  } else if (Array.isArray(data)) {
    rawEntries = data;
  } else {
    throw new Error("无法识别的世界书格式（需要 entries 字段或数组）");
  }

  rawEntries.forEach(function(v) {
    var comment = v.comment || v.title || "";
    var cat = comment.split("-")[0];
    if (!cat || cat.length > 1 || !/^[A-Z]$/.test(cat)) cat = "?";
    entries.push({
      uid: v.uid || 0,
      comment: comment,
      keys: v.key || v.keys || [],
      content: v.content || "",
      cat: cat
    });
  });

  entries.sort(function(a, b) { return a.uid - b.uid; });
  return entries;
}

// ====== 数据加载流程 ======

function setSourceBadge(type) {
  var badge = document.getElementById("source-badge");
  badge.style.display = "inline-block";
  if (type === "live") {
    badge.textContent = "最新";
    badge.className = "source-badge live";
  } else if (type === "cached") {
    badge.textContent = "缓存";
    badge.className = "source-badge cached";
  }
}

function onDataReady(entries, source) {
  ENTRIES = entries;
  document.getElementById("total-count").textContent = ENTRIES.length;
  document.getElementById("loading-overlay").classList.add("hidden");
  document.getElementById("upload-overlay").classList.add("hidden");
  document.getElementById("search-input").disabled = false;
  document.getElementById("search-input").focus();
  setSourceBadge(source);
  initCatChips();
  filterAndRender();
}

function showLoading(text) {
  document.getElementById("loading-text").textContent = text || "正在加载世界书数据...";
  document.getElementById("loading-overlay").classList.remove("hidden");
  document.getElementById("upload-overlay").classList.add("hidden");
}

function hideLoading() {
  document.getElementById("loading-overlay").classList.add("hidden");
}

// 尝试 fetch JSON（从同目录或相对路径）
function tryFetchJSON() {
  var urls = [
    "./" + WORLD_BOOK_FILENAME,
    "./性癖大百科_BL正太版.json",
    "../" + WORLD_BOOK_FILENAME,
  ];

  function tryNext(i) {
    if (i >= urls.length) return Promise.reject(new Error("所有 fetch 路径均失败"));
    return fetch(urls[i], { cache: "no-cache" }).then(function(resp) {
      if (!resp.ok) throw new Error("HTTP " + resp.status);
      return resp.json();
    }).catch(function() {
      return tryNext(i + 1);
    });
  }

  return tryNext(0);
}

// 主初始化
function init() {
  showLoading("正在读取世界书 JSON...");

  // 第一步：尝试 fetch（适用于 HTTP 服务器或支持 file:// fetch 的浏览器）
  tryFetchJSON().then(function(data) {
    var entries = parseWorldbook(data);
    // 保存到 IndexedDB
    saveToIDB(entries).catch(function() {});
    onDataReady(entries, "live");
  }).catch(function(fetchErr) {
    console.log("Fetch 失败: " + fetchErr.message + "，尝试缓存...");
    // 第二步：尝试 IndexedDB 缓存
    showLoading("正在读取本地缓存...");
    loadFromIDB().then(function(cachedEntries) {
      if (cachedEntries) {
        onDataReady(cachedEntries, "cached");
        // 后台继续尝试 fetch（静默更新）
        tryFetchJSON().then(function(data) {
          var entries = parseWorldbook(data);
          if (entries.length !== ENTRIES.length || entries[0]?.uid !== ENTRIES[0]?.uid) {
            saveToIDB(entries).catch(function() {});
            ENTRIES = entries;
            setSourceBadge("live");
            initCatChips();
            filterAndRender();
            document.getElementById("total-count").textContent = ENTRIES.length;
          }
        }).catch(function() {});
      } else {
        // 第三步：显示上传界面
        hideLoading();
        showUpload("未找到数据文件，请手动加载 JSON");
      }
    }).catch(function(idbErr) {
      console.log("IndexedDB 失败: " + idbErr.message);
      hideLoading();
      showUpload("未找到数据文件，请手动加载 JSON");
    });
  });
}

// ====== 文件上传（兜底） ======

var dropZone = document.getElementById("drop-zone");
var fileInput = document.getElementById("file-input");
var uploadOverlay = document.getElementById("upload-overlay");

dropZone.addEventListener("click", function() { fileInput.click(); });
fileInput.addEventListener("change", function(e) {
  if (e.target.files.length > 0) loadFile(e.target.files[0]);
});

dropZone.addEventListener("dragover", function(e) {
  e.preventDefault();
  dropZone.classList.add("dragover");
});
dropZone.addEventListener("dragleave", function() {
  dropZone.classList.remove("dragover");
});
dropZone.addEventListener("drop", function(e) {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  var file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

// 页面任意位置拖拽（上传界面打开时）
document.addEventListener("dragover", function(e) { e.preventDefault(); });
document.addEventListener("drop", function(e) {
  e.preventDefault();
  if (!uploadOverlay.classList.contains("hidden")) {
    var file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  }
});

function showUpload(hint) {
  document.getElementById("loading-overlay").classList.add("hidden");
  uploadOverlay.classList.remove("hidden");
  document.getElementById("search-input").disabled = true;
  if (hint) {
    document.getElementById("upload-hint").textContent = hint;
  }
}

function loadFile(file) {
  if (!file.name.endsWith(".json")) {
    document.getElementById("upload-hint").textContent = "⚠️ 请选择 .json 文件";
    return;
  }
  showLoading("正在解析 " + file.name + "...");
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var entries = parseWorldbook(data);
      saveToIDB(entries).catch(function() {});
      // 记住文件名，下次优先 fetch
      WORLD_BOOK_FILENAME = file.name;
      onDataReady(entries, "live");
    } catch(err) {
      hideLoading();
      showUpload("JSON 解析失败: " + err.message);
    }
  };
  reader.onerror = function() {
    hideLoading();
    showUpload("文件读取失败，请重试");
  };
  reader.readAsText(file);
}

// 手动重新加载 / 换文件
function reloadData() {
  showLoading("正在重新加载...");
  tryFetchJSON().then(function(data) {
    var entries = parseWorldbook(data);
    saveToIDB(entries).catch(function() {});
    onDataReady(entries, "live");
  }).catch(function() {
    hideLoading();
    showUpload("自动加载失败，请手动选择 JSON 文件");
  });
}

// ====== 分类筛选 ======

function initCatChips() {
  var container = document.getElementById("cat-chips");
  var counts = {};
  ENTRIES.forEach(function(e) { counts[e.cat] = (counts[e.cat]||0) + 1; });

  container.innerHTML = "";
  var allChip = document.createElement("span");
  allChip.className = "cat-chip active";
  allChip.dataset.cat = "__ALL__";
  allChip.innerHTML = "全部<span class='count'>(" + ENTRIES.length + ")</span>";
  allChip.onclick = function() { toggleCat("__ALL__", allChip); };
  container.appendChild(allChip);

  CAT_ORDER.split("").forEach(function(cat) {
    if (!counts[cat]) return;
    var def = CAT_DEFS[cat] || cat;
    var chip = document.createElement("span");
    chip.className = "cat-chip";
    chip.dataset.cat = cat;
    chip.innerHTML = cat + " " + def + " <span class='count'>(" + counts[cat] + ")</span>";
    chip.onclick = function() { toggleCat(cat, chip); };
    container.appendChild(chip);
  });
}

function toggleCat(cat, chip) {
  if (cat === "__ALL__") {
    activeCat = "__ALL__";
    document.querySelectorAll(".cat-chip").forEach(function(c) { c.classList.remove("active"); });
    chip.classList.add("active");
  } else {
    document.querySelector('.cat-chip[data-cat="__ALL__"]').classList.remove("active");
    if (activeCat === cat) {
      activeCat = "__ALL__";
      document.querySelector('.cat-chip[data-cat="__ALL__"]').classList.add("active");
      chip.classList.remove("active");
    } else {
      document.querySelectorAll(".cat-chip").forEach(function(c) { c.classList.remove("active"); });
      chip.classList.add("active");
      activeCat = cat;
    }
  }
  filterAndRender();
}

// ====== 搜索 ======

function tokenize(text) {
  return text.toLowerCase().trim().split(/\s+/).filter(Boolean);
}

function matchesSearch(entry, tokens) {
  if (tokens.length === 0) return true;
  var haystack = [entry.comment].concat(entry.keys).concat([entry.content]).join(" ").toLowerCase();
  return tokens.every(function(t) { return haystack.indexOf(t) !== -1; });
}

function filterAndRender() {
  var tokens = tokenize(searchTerm);
  var filtered = ENTRIES;
  if (activeCat !== "__ALL__") {
    filtered = filtered.filter(function(e) { return e.cat === activeCat; });
  }
  if (tokens.length > 0) {
    filtered = filtered.filter(function(e) { return matchesSearch(e, tokens); });
  }
  document.getElementById("match-count").textContent = filtered.length;
  renderResults(filtered, tokens);
}

// ====== 渲染 ======

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightText(text, tokens) {
  if (!tokens || tokens.length === 0) return text;
  var result = text;
  tokens.forEach(function(t) {
    var escaped = escapeRegex(t);
    var regex = new RegExp('(' + escaped + ')', 'gi');
    result = result.replace(regex, '<mark class="highlight">$1</mark>');
  });
  return result;
}

function renderResults(entries, tokens) {
  var container = document.getElementById("results");
  if (ENTRIES.length === 0) {
    container.innerHTML = '<div class="empty">正在加载数据...</div>';
    return;
  }
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">没有匹配的条目 (´・ω・`)</div>';
    return;
  }
  container.innerHTML = entries.map(function(e) {
    var catDef = CAT_DEFS[e.cat] || e.cat;
    var preview = e.content.replace(/<[^>]+>/g, '').substring(0, 200);
    var keysHtml = e.keys.slice(0, 12).map(function(k) {
      return '<span class="card-key">' + highlightText(k, tokens) + '</span>';
    }).join('');
    var titleHtml = highlightText(e.comment, tokens);
    return '<div class="card" id="card-' + e.uid + '" onclick="toggleCard(this)">' +
      '<div class="card-header">' +
        '<div class="card-title">' + titleHtml + '</div>' +
        '<div class="card-meta">' +
          '<span class="card-cat" title="' + catDef + '">' + e.cat + '</span>' +
          '<span class="card-uid">UID ' + e.uid + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-keys">' + keysHtml + '</div>' +
      '<div class="card-preview">' + highlightText(preview, tokens) + '</div>' +
      '<div class="card-full">' + highlightText(e.content, tokens) + '</div>' +
      '<div class="card-actions">' +
        '<button onclick="event.stopPropagation(); copyEntry(' + e.uid + ')">📋 复制内容</button>' +
        '<button onclick="event.stopPropagation(); copyTitle(' + e.uid + ')">📝 复制标题</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ====== 交互 ======

function toggleCard(card) {
  card.classList.toggle("expanded");
}

function getEntry(uid) {
  return ENTRIES.find(function(e) { return e.uid === uid; });
}

function copyEntry(uid) {
  var e = getEntry(uid);
  if (e) copyToClipboard(e.content);
}

function copyTitle(uid) {
  var e = getEntry(uid);
  if (e) copyToClipboard(e.comment);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); } catch(e) {}
  document.body.removeChild(ta);
}

function exportVisible() {
  var tokens = tokenize(searchTerm);
  var filtered = ENTRIES;
  if (activeCat !== "__ALL__") filtered = filtered.filter(function(e) { return e.cat === activeCat; });
  if (tokens.length > 0) filtered = filtered.filter(function(e) { return matchesSearch(e, tokens); });
  var lines = filtered.map(function(e) {
    return e.comment + " (UID" + e.uid + ") [" + e.cat + "] 关键词: " + e.keys.slice(0,8).join(", ");
  });
  copyToClipboard(lines.join("\n"));
  alert("已复制 " + filtered.length + " 条标题到剪贴板");
}

function clearAll() {
  document.getElementById("search-input").value = "";
  searchTerm = "";
  activeCat = "__ALL__";
  document.querySelectorAll(".cat-chip").forEach(function(c) { c.classList.remove("active"); });
  var allChip = document.querySelector('.cat-chip[data-cat="__ALL__"]');
  if (allChip) allChip.classList.add("active");
  filterAndRender();
}

// 搜索防抖
var debounceTimer;
document.getElementById("search-input").addEventListener("input", function() {
  var self = this;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function() {
    searchTerm = self.value;
    filterAndRender();
  }, 200);
});

// 快捷键
document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === "f") {
    e.preventDefault();
    document.getElementById("search-input").focus();
  }
  if (e.key === "Escape") {
    clearAll();
    document.getElementById("search-input").focus();
  }
});

// 移动端触摸优化：防止双击缩放
document.addEventListener('touchstart', function() {}, {passive: true});

// ====== 启动 ======
init();
</script>
